<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elayon • Conexão</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="index">

  <main class="entry-shell">
    <section class="entry-card">
      <img src="IMG-20260218-WA0015.jpg" alt="Logo Elayon" class="entry-logo">

      <div class="entry-badge">Humanidade e Tecnologia em Harmonia</div>

      <h1 class="entry-title">Elayon</h1>
      <p class="entry-subtitle">
        Presença consciente. Automação ética. Mais tempo para viver o Amor ao redor.
      </p>

      <form id="loginForm" class="entry-form">
        <label for="login">Login</label>
        <input id="login" name="login" type="text" placeholder="Seu login" required>

        <label for="senha">Senha</label>
        <input id="senha" name="senha" type="text" placeholder="Senha visível para apresentação" required>

        <button class="btn-primary" type="submit">Conectar Elayon PC</button>
      </form>

      <p class="entry-note">
        Não precisa ser cientista. Basta estar presente e consciente.
      </p>
    </section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
